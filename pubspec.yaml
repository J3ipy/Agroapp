name: agroapp
description: "Projeto da disciplina de programação de dispositivos móveis"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  image_picker: ^1.2.1
  uuid: ^4.5.2
  firebase_auth: ^6.1.4
  provider: ^6.1.2
  http: ^1.2.0
  qr_flutter: ^4.1.0 # Para gerar o QR Code do PIX
  geolocator: ^11.0.0 # Para pegar o GPS do celular
  google_maps_flutter: ^2.5.3 # Para mostrar o mapa
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^17.0.0
  path_provider: ^2.1.2 # Para guardar o relatório no telemóvel
  share_plus: ^13.2.0
  firebase_app_check: ^0.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1 # NOVO
  flutter_native_splash: ^2.4.1

flutter:

  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#ffffff" # Cor de fundo (branco)
  image: "assets/images/logo.png"
  android: true
  ios: true